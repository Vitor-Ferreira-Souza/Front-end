<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center; font-size: 40px;">CSS inline</h1>
    <p style="color: blue; font-size: 25px; text-align: center;">Este é um parágrafo com estilo CSS inline.</p>

    <h1 id="titulo">CSS interno</h1>
    <p id="texto">Este é um parágrafo com estilo CSS interno.</p>
    <style>
        #texto {
            color: green;
            font-size: 25px;
            text-align: center;
        }
        #titulo {
            text-align: center;
            font-size: 40px;
        }
    </style>

    <h1 id="titulo2">CSS externo</h1>
    <p id="texto2">Este é um parágrafo com estilo CSS externo.</p>
</body>
</html>
